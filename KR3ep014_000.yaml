body:
  text: 正文己丑年京畿道胡貸青病劇延余診視舌黑譫語不省人事諸醫均以為實熱實結擬用大承氣湯余診脈洪而無力不渴復以薑片擦舌即淡症若傷寒化為虛熱擬用人參竹葉石膏湯一服便行見效加減數劑而愈後月餘舌退一殼如枳殼即書中所謂六十樣舌中之銕甲舌陰虧也設症不辨虛實則死生反掌矣己丑工部員外楊味春夫人吳勤惠公小姐產時搐搦不省人事集醫治以肝風不效適夫人嫡堂兄吳純甫太守進京引見與余父子世交延余診視脈虛知為血暈非肝風也先用韭菜根置兩壺中加醋煮開以壺兩嘴對兩鼻孔熱氣熏之立時生男甦醒擬以當歸參耆千金湯服之安然繼而胞衣不下者一日閤家驚惶余著尋雞頭菱葉撕破加炒皂刺三錢同煎服之時許胞衣隨惡血分碎而下安然無恙矣己丑候選通判繆仲勉少君傷寒他醫誤為瘟疫重用涼藥以致病劇臥床兩月痰喘欲絕延余診視脈沉濡而滑相等尚可挽回擬以生脈散加半夏杭芍服之見效數服即能飲食治理數月兩腿不能伸屈站立其母只此一子不勝情急詢余曰廢否余曰以脈緩和無力不至殘疾即用十全大補湯加杜牛膝下注三陰並令捶打以舒筋血又兩月全愈矣庚寅年戶部員外寶源局監督胡呂瑞少君瀹生鹺尹壺相小產胎不下者十餘日諸醫均以攻代之藥胎更不下而疼如絞命在旦夕延余診視脈濡以體素弱加以小產誤服攻伐重傷氣血以致血竭而胎不下以十全大補湯加重以助氣血加朴硝一錢以化死胎即下去硝用生化湯加參耆以扶氣血數服而愈壬辰胡呂瑞部郎痢疾晝夜百餘次汗出如流年逾五旬諸醫均以年老氣血就衰將脫之象重用參耆等藥而痢反劇延余診視脈急有力寒化為邪照內經初痢用清久痢用固之法擬以黃芩湯加減以扶正清熱胡不敢服強而後可一服見效數服減輕滿月後用真人養臟湯加減滋陰固攝之劑數服遂愈辛卯劉仲良太史夫人比部段少淪之胞妹因觀劇夜深衣單卒中痰迷齒脈均閉便溺俱遺心窩微存一息針不出血諸醫束手延余診視曰症有七不論脈此其痰閉之一也系受風寒痰閉便溺俱遺亦非五臟絕也手未撒發未指面未如妝汗未如珠尚可挽回幸假至契深信不疑擬以小續命湯三生飲再造丸合參加全蠍等藥以扶正氣逐風化痰行氣和血以口閉藥不下咽用烏梅擦牙竹箸啟齒小壺呷藥時許即呼媽矣醫治三日方蘇月餘遂愈胡公度待御之僕某年弱冠在京出痘色紫周身無縫登屋狂叫延余診視脈洪實有力舌苔黑知為熱邪擬歸宗湯加減以去熱邪燥糞遂安復擬犀角地黃加減清熱透發數貫膿結痂而愈變為麻臉非舊日面目矣又有廚夫某中風不語他醫誤以瘟治病劇延余診視脈細知系卒中擬以小續命加參耆一服即大呼曰何不早服此藥也又大同居東沈智泉中風亦用此藥加減而愈又水部正郎楊紫滄中風亦用此藥加減而愈又內務府科房王壽齡母中風亦用此方加減而愈又給諫洪良品中風亦用此方加減壽延二年故後哲嗣鴻卿明府向云誤信人言以年老氣衰將余初擬方內羌活獨活防風未用以致病未除根也其餘貧民無名之人不可勝道也唐春卿閣部堂於壬辰秋患背寒如冰難以轉動月餘矣延余診視少陽弦緊太陰緊急知系兩經外感汗未解澈之伏邪擬以柴平散加減以和解之唐公以為體素虛弱他醫用參耆姜附重劑尚不能愈而以此和解可乎余曰譬如盜賊伏於家中不開門驅逐害焉能除請姑試之一服見效唐曰十日後天壇當瘥能否余曰可復擬滋養之劑數服大愈果應瘥矣劉次方於庚寅年為巡街御史時相召宴飲余赴道謝言未曾面何見愛之深也劉云見餘脈案擬方真有道理願為疾病扶持之交余以小道偶中遜謝無何劉患牙疼面腫太陽筋跳如錐痛諸藥罔效寢食俱廢延余診視脈數無力知為虛熱氣血相搏邪火上蒸內服玉女煎加減外以開水熏洗痛處以和氣血又以熱手巾熓之再用燒酒以小指蘸滴耳內如火外發傾刻痛止氣血和矣再用唾膏貼之消腫再用硼砂冰片細辛蒲黃黃柏青鹽共研細末頻擦牙齦消腫止疼內服滋陰以退虛熱即愈又水部張蔚如夫人牙疼異常飲食俱廢亦如法加減治之遂愈此虛火疼十之八九若實火疼宜用連翹銀花綠豆皮蘆根等清涼之藥若蟲牙疼用明雄黃松香等藥擦之即死以上諸疼七十方中無此妙也薩嘉樂太史夫人患牙疳腫疼異常已落一齒幾於穿鼻透腮延余診視脈洪有力知為熱毒內服金銀花散加減外用硼砂冰片紅棗燒灰兒茶人中白陀僧青鹽枯礬研細末敷繼用犀黃散加輕粉麝敷之旬日遂愈庚寅張季端殿撰夫人體虛難眠延余診視脈沉細用溫補藥數服而愈嗣後感冒風寒渠以為舊症用參耆等藥服之以致沉重復延診視脈緊無力知為虛人外感治以再造散加減解邪和中之劑服之寒戰似藥不合渠言奈何余復診之脈動言時發汗以姜白糖水飲之助氣夫人胞叔楊子琛明府知醫信餘力言不錯藥邪相爭故寒戰耳張留余俟之至十點鐘時果汗而愈矣又張次子二歲時素患腿疼不能行走教人捶打以重物厭之方眠余診視脈弱極兩尺幾無知為先後天不足之故擬用十全大補湯加杜仲牛膝下注三陰數服遂愈甲午秋戎部李星若夫人腹疼如絞日久欲死延余診視脈沉細知系虛寒氣結他醫誤用涼藥以致病劇余始擬以附子理中湯加減一服而愈旋因食抄絞痛如故九日不便診脈虛細系九結中之秘結不可攻下擬以前方加潤導之品便而愈旋又風抄九月初一日痛絕齒脈俱閉僅存一息其胞兄內閣中書虹若言女初三日吉期設無救奈何余為情急恐藥餌不及囑星若親灸章門虎口三里等穴並將前方加山甲牛膝桂枝木香烏藥等擦牙以箸啟齒呷藥一時而蘇脈復余出曰包辨喜事無虞數服而愈丙申年來請言夫人血崩暈絕往診脈擾急知系小產非血崩也治以生化湯加參耆去舊生新之品遂愈馬積生太史夫人亦患腹痛如絞數月病劇延余診視脈息腹痛相同因體因症加減擬方不敢服以為與他醫用寒藥相反也適曾任廣州府馮端本太守壽日與馬姻親李星若亦姻婭同往稱禮即馬遍詢同鄉可否服余之藥僉云可歸即試服次早請余言病減半矣深信不疑連服數劑而愈農部張馨庵屠遜庵亦河南人兩夫人亦患此症欲死均為如法治愈徐頌閣侍郎三公子於甲午歲淋症他醫誤以血淋苦寒之藥數月病劇臥床不起身不能動將一年矣延余診視僅存一息脈沉細知為陰虧變色非血淋也詰其故言無外務以妻歸寧浙省病年不歸思想而得余曰欲心一動精卻離舍成淋久則陰虧變色誤為熱淋治以寒藥至於此極擬以人參菟絲丸加減大補之劑以固心腎一服見效復診加減數服能食月餘全愈李實之太史放甘肅主考時夫人住京系朱相國之孫女湖北廉訪之女內閣章京伯平之妹產後病劇延余診視脈沉細四肢拘攣癱痿溺黑知受風寒化熱為痹擬以獨活寄生湯加減見效繼為加減數服而愈朱即請以夫人小產數胎為憂余診視脈沉無力氣血兩虛擬以泰山磐石散千金保胎丸合參令有孕時服三十劑果胎安矣連舉二子甲午農部李有榮之夫人臨產三日未落草咸謂胎死腹中夫人自期亦死情急許稔婆百金下死胎以保夫人之命稔婆無策延余診視脈緩舌苔面色均無青赤知胎無恙詢之稔婆向言尚未順胎知經人早漿破血竭猶魚在盆無水不行數日不生者多也安熨夫人不要慌亂靜心安臥包管無恙即重用達生散加重參耆歸芎各一兩外加蔥頭七個黃楊腦七個熊亦奇太史知醫斟酌意藥太重余言非此重劑不能壯氣生血毋疑幸李素信余醫留坐茶點少待服藥時許家人報喜生一少爺母子均安然矣癸巳孫來山尚書小姐因寒癃閉二日腹脹如鼓李山農方伯知醫曾治尚書濕病而愈茲治小姐不效素信余醫代為薦診少陽脈弦知為虛痞擬以柴胡半夏茯苓湯加減汗解溺暢遂愈京畿道徐叔鴻夫人胸脹大痛世醫誤以經閉三月癥瘕治之幾危延余診視六脈相等陽搏陰別孕兆也徐公曰生過三胎知無孕余曰十樣胎十樣生年近四旬氣血漸衰正氣不敵胎氣引動素有肝氣故脹痛擬以安胎養血調和肝氣之品請姑服之以手試腹如伏雜狀即知是胎非病徐公如約次早來請言真醫也果胎跳矣再擬數服全愈至秋舉一子即六少爺也乙未夏京師霍亂轉筋急症傾刻無救一月之間死有十數萬人如前明崇禎六年之瘟疫相似也余因刊有辯瘟論霍亂論以行氣活血針刮各法施散數十萬張救活無算適小妾亦得此症如法救活其他如法救活更無算惟龔魯卿觀察僕救活後戒食米食不聽食粥兩碗症發不治而亡乙未比部正郎歐陽伯春病傷寒世醫誤以為瘟治以苦寒之藥不眠者三日譫語揭被狂叫大熱舌苔黑刺延余診視脈洪無力知為虛熱以姜擦舌即白的為傷寒非瘟疫也虛火上炎內無實熱擬以人參竹葉湯加減引火歸原之品伊諸親多不敢主幸伊姑丈比部郭斡臣力主服之遂安四服全愈甲午王子捷太史令緩感冒風寒理宜解表和中汗澈即愈而世醫誤以犀角羚羊角等藥引邪入內不能言語病劇延余診視脈沉緊用羌活湯加附子肉桂去黃芩生地一服能言發出疹子而愈甲午冬黃慎之殿撰傷寒時醫以為冬瘟治以元參論兩等寒藥二十餘日煩躁不省人事三日不能閤眼延余診視脈數不及知為胃氣欲絕之象擬以人參湯加減引火歸原之劑一服遂眠至次午方醒清余道謝復診脈復依方加減月餘全愈甲午劉伯崇殿撰弟歸感寒譫語暴病驚人延余診視脈浮數知為風寒化熱無汗擬以羌活湯加減一服汗解而愈甲午冬程從周軍門少君紹周太守患喉痹時醫誤以溫補治之遂致喉腫水不下咽三日矣延余診視脈沉細余曰此症肺胃腎虛火上衝喉嚨成痹單者重而雙者輕最忌刀針刺破喉嚨引毒入內不治並忌溫藥助邪散藥發邪涼藥伏邪誤服溫補助邪項腫以致於此余為先刺少商商陽二穴出黑血以淺毒貼金剛匙以拔毒吹吳氏丹藥以消毒擬以滋陰清肺湯加減以和解之服藥時許飲水晚間食粥次日加托裡透膿之品數服外潰內消而愈福建陸路提督程魁齊軍門年六旬傷寒時醫以年老氣衰重用參耆補藥固邪於內痰喘不眠病劇延余診視脈緊數知系閉塞寒邪化熱痰喘擬以小青龍湯加減解寒邪疏通肺氣化痰之品僉曰年老氣衰不可服余曰有症無損開門逐盜之法姑試少服其弟從周軍門天姿過人以為然囑先服半咳喘頓減終服大好依方加減十日而愈京畿道胡岱青小姐年及笄時腹痛如絞時醫均以受寒重用姜附肉桂其疼逾甚延余診視脈澀無寒症因言人腹中有蛔蚘長寸線白等蟲九種長蟲長一尺不治胡公言曾便過尺長白蟲余囑即買花榻餅一個令服再買榧子二斤炒如粟子令吃數日便出長白蟲數尺長無算遂愈王小岑洗馬患目昏花不能視物時醫以為肝熱清風退火之藥病逾甚延余視診脈沉細知為氣虧內障擬以八味還睛散去風藥重加參耆服三十餘劑遂能視書寫字適考試京察一等召見簡放襄陽知府陳紫蓬太守在京投供五年與余契交患脫肛腫痛時醫均為痔瘡治之腫疼逾甚延余診視脈沉虛年逾六旬知為脫肛便血急則治標先以螺汁合梅片敷之減疼內服滋陰清提補藥頓縮外用椅墊日曬大熱輪換坐之又以開水頻洗數日而愈李虹若小軍機癉瘧誤服他醫涼藥病劇延余診視脈緊間日一發先冷後熱譫語四時方退已二十餘日自謂五臟皆空病將不治余言包治擬以清脾飲加減渠云最忌柴胡余云此症必用柴胡和解少陽姑試服之過日又發伊云柴胡不效定不服矣余診脈見緩知邪將解復強令服瘧止再以加減數服而愈從此不信許濟東大名醫矣戶部萬錫珩夫婦咳嗽晝夜不止痰吐成盆時醫用人參鹿茸等藥痰咳逾甚延余診視脈洪數知系風寒閉於肺中擬以二陳導痰湯加麻黃一服而愈伊子書城黃疸秘結十數日不便時醫治以承氣湯余診脈沉細知系虛黃秘結擬以茵陳潤導滋養氣血使下焦氣化而能出矣飲以豬蹄湯十四日便通黃退遂愈馮霖汝明府夫人胎中漏血閤家驚慌延余診脈和緩和系胎漏而胎未動擬以安胎養血之品每月行血如經十月而生母子安然潘輝庭正郎令親楊姓病狂上屋他醫均以犀角三黃湯力主延余診視脈洪無力知系風寒未解虛火上炎擬參苓甘露飲加柴胡和解等品伊同鄉多不為然惟潘半信半疑焚香拈鬮得余藥方囑一劑作三服初服次服安眠終服愈矣張書城侍御夫人病每厥不省人事諸醫均以肝風治之不效延余診視脈沉澀知系鬱結氣厥非肝風也詢夫人生育否答以無年幾何答以不惑余曰夫貴妻榮何以氣鬱至此夫人言理該如此而事有不然者余復詢張公納側室否張曰今春買一妾余曰后妃能逮下而小星抱衿與裯樂只君子有何郁處及至書房余詰張公具以告實寢妾處時多余曰誰家郎能被汝呼也無怪氣厥耳遂擬以調氣和血之方勸張公常宿夫人房為引數服而愈後遇張公笑余醫外醫耳唐炳霖侍御小姐年已及笄病劇延余診視脈澀知為氣鬱詢以母氏唐曰故余曰俗語能從討飯之母不跟做官之父小姐笑復問兄嫂唐曰不和因得病余曰小組自有家耳諸事忍讓何氣為詢婿誰家唐曰待字余曰有高紹祥者年弱冠宦家公子才貌均佳今科備中堪為良偶唐頷之因擬以調氣之品數服而愈余與柳太守為媒高允請命於兄津江縣知系查覈病故事寢旋說與某主政偕老矣祁子和尚書之孫君司馬段少滄軍機之婿夫人產後傷寒譫語病重延余診視脈緊有力擬以葛根湯生化湯合參和解一服汗澈而愈李有槻明府在京投供患瘧數月病勢沉重諸醫罔效延余診視脈沉緊知邪伏於太陰少陽之間擬清脾飲加減略重草果以解兩經之邪外用胡椒末合蒜搗爛置兩錢於兩關脈上置椒蒜泥用布條札緊一伏時拔出白泡泄邪遂愈李筱垣太史患喉痹甚重如法治愈遂信余醫過從有年每逢公館眷屬失調延余診視立痊故情誼逾厚也兵部王銕珊夫人胎中漏血向言無孕余以診脈流利不絕認定為孕以安胎養血之品治之迨四個月後胎動夫人猶曰無孕王怒曰私子也何諱為夫人亦恚其言穢余勸曰夫婦均年不惑無子設他醫誤以病治奈何此情急之言毋足怪夫婦轉怒為喜後舉一子親朋賀筵余曰私子也眾詢顛末具以告咸大笑工部正郎楊樞孫暴受寒邪上下氣隔汗出如珠腹脹如鼓諸藥罔效用稀涎散吐出兩大盆痰涎遂愈此醫道所以有汗吐下和四要法也張文和公孫聯恩正郎夫人病劇延余診視脈細知為氣虛中滿非實脹也擬以補中益氣湯數服遂愈馮傑觀察子茂才進京鄉試病痢日廁無數他醫重用桂附論斤病劇延余診視脈數知系熱邪擬黃芩湯加減一服見效月餘痢仍一日數次改真人養臟湯數服全愈吳燮臣司業父刑部毓春公咳喘嘔逆延余診視脈七八至將絕之候服殿撰陳冠生方石膏黃連多日以至此劇余擬腎氣湯加減以救垂絕之陰陽服之見效次早來請以為得手至則見喘已輕呃逆已止精神大好原可挽回復依原方加以滋陰扶陽之品適陳冠生至持方連曰火上添油也余請示姓名知為殿撰曰何知為熱陳曰脈數曰浮數為風熱沉數為寒熱洪數為大熱數而有力為實熱數而無力為虛熱今數而無力不及之象猶燈油將盡拍拍欲絕之候添油猶恐不燃若加滴水即滅矣陳曰脈之理微曰誠然然優人胡琴二絃三指挑撥五音合調君能之乎陳曰未習也曰以此即知脈理未習故不知也遂辭燮臣司業送出詢以病勢余曰若聽陳君主政預備後事不出三日也旋陳病自用苦寒之藥亦亡王惠棠員外四旬無子不能寓內為之擬方滋補之劑服數十帖一日請診視姨太太脈陰搏陽別左大右小余曰喜脈弄璋之兆按月請診果舉一男後連生子侍郎許筠庵胸脘絞痛他醫均為熱症延余診視脈沉知為新受寒邪滯氣胃脘作痛非心疼也擬排氣飲加減公子樨筠內閣言素服肉桂恐系受熱余以脈論的寒非熱出詣李山農方伯具以告渠與許公郎舅至親兼知醫急往請服余方遂愈余往京十年來往診視名公巨卿隨手而愈者以舉其人焉周錫恩太史陳梅初侍讀吳祖農太史馮孟華探花蒯禮卿太史陳桂生侍郎陳桂溪太史王茂庵中書周葆戶部翁鼎臣工部顏曾州判韋篤臣戶部宋芸子太史陳嵋戶部馮賡如中國子監教授張拔臣戶部區德霖吏部嵩潤御茶房總辨方芰塘參議姚幼庵戶部李芝生兵部彭積初戶部龔引生刑部正郎龔懷西太史劉藹如戶部正郎李小出戶部鄔質義戶部祁子和工部尚書郭應中工部徐乃秋侍御陳順鑲中書湯承慶附監劉味齊戶部許孝生中書陳瑤圃軍機郭之全軍機範子蔭戶部楊蓮甫太史李牧之軍機張弟兄秋太史左笏卿刑部戴少懷太史余鼎臣總鎮武克訓光祿寺覺羅炳成考宗室徐葆生刺史楊蔚霞中書仇淶之戶部左蘧生司馬伍蘭蓀中書何小溪刑部張蔚森工部鄭芷軒光祿寺正卿何潤甫工部員外王集禮部員外鄭皋刑部李文田侍郎黎大均刑部熊潤甫吏部劉金榜通判楊爵修典史曹兆福正郎謝啟華戶部朱光黻太史沉桐內閣朱珩助教萬郎庭戶部範幼坡太史江忠立戶部丁栻之侍御徐仲阮兵部馮立齊廣州知府曹顓枚侍御李模皋侍御李文輝山西知縣祥蔭大挑光祿寺評事鄭廷襄侍御鄭黻門侍御高袖海知縣徐本立河南知縣曾重伯太史俞恪士刑部鄰蘭樵知縣湯伯英優貢周甲三太史裴玉山侍御張次山侍御柏云卿太史方德堃四川合州知州陳香士戶部吳效曾知府熊經仲太史李釗雷州知府魏時鉅太史王兆蘭河南開封知府徐道焜侍御馬吉璋太史林貽書太史陳兆文太史丁道津兵部黃書霖知府彭向青傳臚王錦堂正郎趙芝珊太史高理堂侍御曾樹椿正郎孫筱園刑部崇源小𪯲校饒芝祥太史陳香輪侍御張畹農軍機郭清安安徽副將濮紫泉軍機劉啟翰正郎王紹廉太史徐古香軍機胡寶鋒軍機章同知州楊知齊海州知州徐壽衡尚書吳渭濱通州知州張弼臣太史孫朝華軍機許介侯太史翁慶麟知縣韋其廉浙江知縣韋鼎鄉試韋繼賢戶部許鳳文鹽過於大使張道宇刑部劉光第刑部朱益藩太史凌文煥廣東知縣黃儒荃委署侍讀吳平泉安徽知縣吳石卿揀選知縣許拔庵內閣全芸軒大使舒云亭江蘇知縣魏學恆綏陽縣知縣魏理云柳州知府俞耕齊山東知縣陸賡卿吏部毛筍陔戶部毛篤山知府吳堪知縣尹緝庵知府李灼華太史楊覲圭兵部羅炳熔知縣徐本華知縣李小研大常寺卿尹瑯若太史岑云堦太僕寺卿汪叔芾內閣葉玉書內閣關杏予心正郎延清員外藏濟臣洗馬宮竹褸山西平原知縣洪禧知縣汪文銜刑部昌頎四品宗室馮文蔚閣學梁翎遠太史白曾焯刑部趙延璜員外陳文銳禮部景恩宗室鎮國將軍黃珊庵侍御朱云甫太史張友鶴北通州馮志先同知楊望洲知縣楊藝芳大名道鄭芝岩侍御京察浙江糧道巢夢芝知縣趙心笙南捕廳李新之元亨金店葉鐸人太史王小航禮部鮑印亭記名道羅程青四川定遠縣胡韻蘭舉人王彥泉太史楊樹內閣侍讀汪春榜兵部楊廷桂守備湖南提塘周瑞鑾湖北東湖縣知縣孫啟瑞工科連總叔軍機王廷鈺寧津知縣丁理堂教諭陳金鰲松藩總鎮陳梓琴知縣袁葆生兵部賈孝珍山西知州徐子靜中允儲冰薌工部蓋永貞平泉州知州楊登甲刑部孔樾農部膝均知縣楊東皋刑部楊維新崇慶州錢開祐戶部王承陛東河同知區海峰刑部余鼎三太史劉培元福山總鎮何慶濤教習車誠一內閣凌福彭太史謝秀山刑部魏學恆山西河曲縣知縣曾紀雋知縣王慶禔教授王仲連侍講王季連廕生王幼連舉人承蔭正郎周葆禎縣丞屠義容昌平知州江瑞麟知縣曾景釗刑部曾伯陶襲伯蔡學淵戶部何玉磷知縣陳嘉言太史楊鼎新甘肅知縣關六生軍機張樂山知縣丁小春同知縣育甫州判英心垣小𪯲校徐芷帆太史鄰亨先員外鄒經甫禮部鮑心增吏部聶楫臣禮部員外詹黻廷禮部正郎楊覲宸戶部郭喬生戶部郭蘭蓀觀察汪範卿宗人府主政袁葆生兵部袁敏孫正郎丁竹珊中書黃篤瓚中書朱夢霆中書潛彝帆中書林右臣中書丁衡甫吏部丁錫丞吏部朱古科刑部彭維鏞戶部王承洛司馬陳虞延羅家瑋工科卞虞卿花翎侍衛解兆鼎金佐周沈兆梁王治國馬少輔祁子修徐壽干張少山張振邦藍翎侍衛許炳儀秦輔亭耿敘卿葉少樓饒居仁馬俊臣嚴文卿張玉卿朱虎員武舉朱犀員武進士此均延余胗視相得者其他平人逐日送診不可勝記是以醫名噪於京師自愧何敢言醫聊以小道濟人為懷耳
